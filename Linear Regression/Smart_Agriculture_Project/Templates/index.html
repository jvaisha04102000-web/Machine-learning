<!DOCTYPE html>
<html>
<head>
    <title>Agriculture Yield Prediction</title>
</head>

<body>

    <h1>Smart Agriculture Yield Prediction</h1>

    <form action="/predict" method="POST">

        <input type="number" step="any"
               name="rainfall"
               placeholder="Rainfall" required>

        <br><br>

        <input type="number" step="any"
               name="soil_quality"
               placeholder="Soil Quality" required>

        <br><br>

        <input type="number" step="any"
               name="temperature"
               placeholder="Temperature" required>

        <br><br>

        <input type="number" step="any"
               name="fertilizer"
               placeholder="Fertilizer Usage" required>

        <br><br>

        <input type="number" step="any"
               name="humidity"
               placeholder="Humidity" required>

        <br><br>

        <button type="submit">
            Predict Yield
        </button>

    </form>

    {% if prediction %}

        <h2>
            Predicted Yield :
            {{ prediction }} Tons
        </h2>

    {% endif %}

</body>
</html>
